[tool.ruff]
target-version = "py312"

[tool.ruff.lint.per-file-ignores]
# These scripts insert BASE onto sys.path before importing local packages
# (documented convention, CLAUDE.md) — the import can't move to the top.
# Tests don't need this: pytest's pythonpath (below) puts the project root
# on sys.path before collection.
"run_data_quality_agent.py" = ["E402"]
"run_scraper_health_monitor.py" = ["E402"]

[tool.pytest.ini_options]
pythonpath = ["."]
