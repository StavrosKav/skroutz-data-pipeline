version: 2

sources:
  - name: skroutz_raw
    database: "{{ env_var('DB_NAME', 'SkroutzPR') }}"
    schema: public
    description: Raw tables written by the Skroutz pipeline loader (4csvsTOsql.py)
    tables:
      - name: products
        description: One row per unique product, identified by skroutz_link URL
        columns:
          - name: id
            description: Surrogate primary key (BIGSERIAL)
          - name: skroutz_link
            description: Canonical product URL on skroutz.gr (unique key)
          - name: category
            description: Product category (phone | laptop | smartwatch | tablet)
          - name: brand
          - name: model
          - name: first_seen
            description: Date this product first appeared in a scrape
          - name: last_seen
            description: Date this product was most recently seen in a scrape

      - name: price_snapshots
        description: One row per product per scrape date
        columns:
          - name: id
            description: Surrogate primary key
          - name: product_id
            description: FK → products.id
          - name: date
            description: Scrape date (one snapshot per product per day)
          - name: price_eur
            description: Price in euros; NULL if not scraped successfully
