version: 2

# ── Staging ───────────────────────────────────────────────────────────────────

models:
  - name: stg_products
    description: Staging model for the products source table
    columns:
      - name: id
        description: Surrogate PK
        data_tests:
          - not_null
          - unique
      - name: skroutz_link
        description: Canonical product URL (natural key)
        data_tests:
          - not_null
          - unique
      - name: category
        description: Product category
        data_tests:
          - not_null
          - accepted_values:
              values: ["phone", "laptop", "smartwatch", "tablet"]

  - name: stg_price_snapshots
    description: Staging model for the price_snapshots source table
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: id
      - name: date
        data_tests:
          - not_null
      - name: price_eur
        description: Price in euros; NULL means the scraper failed for this product on this day
        data_tests:
          - not_null

# ── Marts ─────────────────────────────────────────────────────────────────────

  - name: vw_latest_prices
    description: Most recent price per product
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
      - name: price_eur
        data_tests:
          - not_null

  - name: vw_price_history
    description: Full daily price history with LAG-based day-over-day change
    columns:
      - name: product_id
        data_tests:
          - not_null
      - name: date
        data_tests:
          - not_null
      - name: price_eur
        data_tests:
          - not_null

  - name: vw_biggest_drops
    description: Products with largest single-day price drops
    columns:
      - name: drop_eur
        description: Should always be negative (filtered in view)
        data_tests:
          - not_null

  - name: vw_brand_summary
    description: Price stats per brand per category
    columns:
      - name: category
        data_tests:
          - not_null
          - accepted_values:
              values: ["phone", "laptop", "smartwatch", "tablet"]
      - name: brand
        data_tests:
          - not_null
      - name: product_count
        data_tests:
          - not_null

  - name: vw_disappeared
    description: Products not seen in last 7+ days
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
      - name: days_since_last_seen
        data_tests:
          - not_null

  - name: vw_price_volatility
    description: 30-day coefficient of variation per product
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique

  - name: vw_brand_price_trend
    description: Daily average price per brand per category
    columns:
      - name: category
        data_tests:
          - not_null
      - name: brand
        data_tests:
          - not_null
      - name: date
        data_tests:
          - not_null
      - name: avg_price
        data_tests:
          - not_null

  - name: vw_price_floor
    description: All-time low and high price per product
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique
      - name: all_time_low
        data_tests:
          - not_null

  - name: vw_hot_deals
    description: Products with price drop + review surge
    columns:
      - name: id
        data_tests:
          - not_null
      - name: price_latest
        data_tests:
          - not_null
