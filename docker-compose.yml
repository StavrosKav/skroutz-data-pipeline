services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-SkroutzPR}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./create_new_schema.sql:/docker-entrypoint-initdb.d/create_new_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pipeline:
    build: .
    env_file: .env
    environment:
      DB_HOST: db
      SKIP_SCRAPE: "1"   # Chrome cannot run in Docker; scrape on Windows then mount CSVs
    volumes:
      - ./Phones_skroutz:/app/Phones_skroutz:ro
      - ./Laptops_skroutz:/app/Laptops_skroutz:ro
      - ./Smartwatches_skroutz:/app/Smartwatches_skroutz:ro
      - ./Tablets_skroutz:/app/Tablets_skroutz:ro
      - ./Clean:/app/Clean
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
